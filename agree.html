<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인정보 동의 | AutoAuction</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/privacy.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-box" style="max-width: 600px;">
            <h1 class="logo" onclick="location.href='/'" style="cursor:pointer">Auto<span>Auction</span></h1>
            <h2>이용 약관 동의</h2>

            <div class="all-agree">
                <label>
                    <input type="checkbox" id="checkAll"> 모든 약관에 동의합니다.
                </label>
            </div>
            
            <form action="/signup" method="get" id="privacyForm">
                <div class="agree-item">
                    <div class="agree-title">
                        <span>[필수] 서비스 이용약관 동의 <span class="required">*</span></span>
                        <input type="checkbox" class="sub-check" required>
                    </div>
                    <div class="agree-content">
                        제 1조 (목적) 본 약관은 AutoAuction이 제공하는 자동차 경매 서비스의 이용조건 및 절차에 관한 사항을 규정함을 목적으로 합니다.
                    </div>
                </div>

                <div class="agree-item">
                    <div class="agree-title">
                        <span>[필수] 개인정보 수집 및 이용 동의 <span class="required">*</span></span>
                        <input type="checkbox" class="sub-check" required>
                    </div>
                    <div class="agree-content">
                        수집 항목: 이름, 이메일, 연락처. 수집 목적: 본인 확인 및 서비스 제공. 보유 기간: 회원 탈퇴 시까지.
                    </div>
                </div>

                <div class="agree-item">
                    <div class="agree-title">
                        <span>[선택] 마케팅 정보 수신 동의</span>
                        <input type="checkbox" class="sub-check">
                    </div>
                    <div class="agree-content">
                        신규 경매 매물 알림, 이벤트 정보 등 광고성 정보를 이메일이나 SMS로 받아보실 수 있습니다.
                    </div>
                </div>

                <button type="submit" class="btn-auth">다음 단계로</button>
                <button type="button" class="btn-auth" style="background:#ccc; margin-top:10px;" onclick="history.back()">취소</button>
            </form>
        </div>
    </div>

    <script src="/js/privacy.js"></script>
</body>
</html>
