<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 | AutoAuction</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" th:href="@{/css/mypage.css}">
    <link rel="stylesheet" th:href="@{/css/edit-password.css}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-box">
            <h1 class="logo" onclick="location.href='/'" style="cursor:pointer">Auto<span>Auction</span></h1>
            <h2>비밀번호 변경</h2>
            <p class="edit-desc">개인정보 보호를 위해 현재 비밀번호를 확인한 후<br>새로운 비밀번호로 변경해 주세요.</p>
            
            <div th:if="${error}" class="error-msg" th:text="${error}"></div>

            <form th:action="@{/mypage/edit}" method="post">
                <div class="edit-form-group">
                    <label class="info-label">현재 비밀번호</label>
                    <input type="password" name="currentPassword" class="edit-input" placeholder="현재 비밀번호 입력" required>
                </div>

                <div class="edit-form-group">
                    <label class="info-label">새 비밀번호</label>
                    <input type="password" name="newPassword" class="edit-input" placeholder="새로운 비밀번호 입력" required>
                </div>

                <div class="mypage-btns">
                    <button type="submit" class="btn-auth btn-submit">비밀번호 변경</button>
                    <button type="button" class="btn-auth btn-cancel" onclick="history.back()">취소</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
