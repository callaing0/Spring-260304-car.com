<!DOCTYPE html>
<html xml:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입 | AutoAuction</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-box signup-box">
            <h1 class="logo" onclick="location.href='/'">Auto<span>Auction</span></h1>
            <h2>새로운 시작을 함께하세요</h2>
            
            <form action="/signup" method="post">
    
    <div class="input-group">
        <label for="name">이름</label>
        <input type="text" id="name" name="name" placeholder="홍길동" required>
    </div>

    <div class="input-group">
        <label for="email">이메일 주소</label>
        <input type="email" id="email" name="email" placeholder="example@auto.com" required>
    </div>
    
    <div class="input-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" placeholder="8자 이상 입력" required>
    </div>

    <div class="input-group">
        <label for="password-confirm">비밀번호 확인</label>
        <input type="password" id="password-confirm" placeholder="비밀번호를 한번 더 입력하세요" required>
    </div>

    <button type="submit" class="btn-auth">가입하기</button>
</form>

<p class="auth-footer">
    이미 회원이신가요? <a href="/login">로그인 하기</a>
</p>
        </div>
    </div>
	<script src="/js/auth.js"></script>
</body>
</html>
